<script>
async function hitungBiaya() {

    const jumlah = document.getElementById("jumlah").value;
    const jenis = document.getElementById("jenis").value;

    if (!jumlah || jumlah <= 0) {
        alert("Masukkan jumlah peserta yang valid");
        return;
    }

    const functionUrl = "https://func-serverless-0920240008-a0gaeffvbhevbtg4.southeastasia-01.azurewebsites.net/api/EstimasiBiaya";

    try {

        const response = await fetch(
            `${functionUrl}?jumlah=${jumlah}&jenis=${jenis}`
        );

        const data = await response.json();

        document.getElementById("hasil").style.display = "block";

        document.getElementById("hasil").innerHTML = `
            <h3>Hasil Estimasi</h3>
            <br>
            <p><strong>Jumlah Peserta:</strong> ${data.jumlah}</p>
            <p><strong>Jenis Konsumsi:</strong> ${data.jenis}</p>
            <p><strong>Harga per Peserta:</strong> Rp ${data.hargaPerPeserta.toLocaleString('id-ID')}</p>
            <p><strong>Total Biaya:</strong> Rp ${data.total.toLocaleString('id-ID')}</p>
        `;

    } catch (error) {
        console.error(error);
        alert("Gagal mengambil data dari Azure Function");
    }
}
</script>
